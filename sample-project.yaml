kind: renku.projectSetup
version: 0.1.0

project:
  name: constantinople
  title: Preparation of the Siege of Constantinople
  type: standaloneMovie
  aspectRatio: "16:9"
  coverFile: sample-project/cover.png
  logline: A historical documentary about how Mehmed II prepared the strategic, technological, logistical, naval, diplomatic, and psychological machine that made Constantinople vulnerable before April 1453.
  summary: >
    The film follows the preparation phase before the siege: a young sultan
    turns inherited ambition into policy, studies a city that has survived
    centuries of attacks, cuts the Bosphorus, embraces gunpowder, and moves an
    impossible weapon toward ancient walls while Constantinople waits for help.

languages:
  - localeTag: en-US
    displayName: English
    isBase: true
    supportsAudio: true
    supportsSubtitles: true

  - localeTag: tr-TR
    displayName: Turkish
    supportsAudio: true
    supportsSubtitles: true

visualLanguageCategories:
  - name: Color
    description: Palette, saturation, contrast, skin treatment, and forbidden color behavior.
  - name: Lighting
    description: Light source logic, contrast, direction, atmosphere, and motivated illumination.
  - name: Camera
    description: Shot size, movement, lens language, camera restraint, and forbidden camera behavior.
  - name: Texture
    description: Materials, surface age, weathering, grain, smoke, dust, mud, fabric, and metal.
  - name: Production Design
    description: Historical material culture, props, costume logic, architecture, and handmade world detail.

visualLanguage:
  - category: Color
    name: Muted earth, stone, bronze, and textile palette
    shortDescription: Umber leather, smoke-gray wool, dirty ivory linen, oxidized bronze, faded burgundy, and blue-gray stone.
    priority: default
    guidanceFile: sample-project/visual-language/color/muted-earth-stone-bronze-and-textile-palette/guidance.md
    promptFile: sample-project/visual-language/color/muted-earth-stone-bronze-and-textile-palette/prompt.md

  - category: Lighting
    name: Practical-source low-key interiors
    shortDescription: Candle, oil lamp, furnace, and torchlight motivate warm interiors with deep brown shadows.
    priority: default
    guidanceFile: sample-project/visual-language/lighting/practical-source-low-key-interiors/guidance.md
    promptFile: sample-project/visual-language/lighting/practical-source-low-key-interiors/prompt.md

  - category: Camera
    name: Slow observational camera grammar
    shortDescription: Mostly locked-off frames, slow lateral tracking, slow push-ins, and restrained reveals.
    priority: default
    guidanceFile: sample-project/visual-language/camera/slow-observational-camera-grammar/guidance.md
    promptFile: sample-project/visual-language/camera/slow-observational-camera-grammar/prompt.md

  - category: Texture
    name: Weathered tactile material truth
    shortDescription: Worn linen, cracked leather, smoke, mud, soot, oxidized bronze, rough stone, and frayed ropes.
    priority: default
    guidanceFile: sample-project/visual-language/texture/weathered-tactile-material-truth/guidance.md
    promptFile: sample-project/visual-language/texture/weathered-tactile-material-truth/prompt.md

  - category: Production Design
    name: Fifteenth-century Ottoman and Byzantine material worlds
    shortDescription: Handmade historical materials without fantasy armor, modern seams, plastic props, or generic medieval imagery.
    priority: default
    guidanceFile: sample-project/visual-language/production-design/fifteenth-century-ottoman-and-byzantine-material-worlds/guidance.md
    promptFile: sample-project/visual-language/production-design/fifteenth-century-ottoman-and-byzantine-material-worlds/prompt.md

continuityReferences:
